name: Build NetScope Desktop

on:
  push:
    tags:
      - "v*"           # trigger on version tags, e.g. git tag v0.1.0
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"   # Apple Silicon
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"    # Intel Mac
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      # ── Linux system deps ───────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libpcap-dev patchelf

      # ── macOS: libpcap is already present via Xcode ──────────────────────────

      # ── Windows: install Npcap SDK for pcap crate ───────────────────────────
      - name: Install Npcap SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          $out = "$env:TEMP\npcap-sdk.zip"
          Invoke-WebRequest $url -OutFile $out
          Expand-Archive $out -DestinationPath "C:\npcap-sdk"
          echo "LIB=C:\npcap-sdk\Lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── npm install ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      # ── Tauri build ─────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional – leave blank to skip)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "NetScope ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
