name: Build NetScope Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Phase 1: create the draft release once ──────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `NetScope ${context.ref.replace('refs/tags/', '')}`,
              body: 'See CHANGELOG for details.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ── Phase 2: build on every platform and upload ─────────────────────────────
  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - name: Windows
            platform: windows-latest
            args: ""
          - name: Linux
            platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libpcap-dev patchelf

      - name: Install Npcap SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: powershell
        run: |
          $url = "https://npcap.com/dist/npcap-sdk-1.13.zip"
          $out = "$env:TEMP\npcap-sdk.zip"
          Invoke-WebRequest $url -OutFile $out
          Expand-Archive $out -DestinationPath "C:\npcap-sdk"
          echo "LIB=C:\npcap-sdk\Lib\x64"           | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIBPCAP_LIBDIR=C:\npcap-sdk\Lib\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIBPCAP_INCDIR=C:\npcap-sdk\Include"  | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple notarization — only used on macOS runners
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # Update bundle signing — tauri-plugin-updater verifies these at install time
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ── Phase 3: assemble update manifest from signed artifacts ─────────────────
  # Runs after all platform builds; downloads the .sig files from the release,
  # constructs latest.json, and uploads it so the in-app updater can find it.
  publish-update-json:
    name: Publish update manifest
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const releaseId = parseInt(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            const assets = release.assets;
            const version = release.tag_name;   // keep "v" prefix

            // Download a text asset by its numeric id via the GitHub API redirect
            async function fetchAssetText(assetId) {
              const response = await fetch(
                `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/releases/assets/${assetId}`,
                {
                  headers: {
                    Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                    Accept: 'application/octet-stream',
                  },
                  redirect: 'follow',
                }
              );
              return await response.text();
            }

            // Find an asset by regex; return null when absent so we can skip
            function findAsset(pattern) {
              return assets.find(a => new RegExp(pattern).test(a.name)) ?? null;
            }

            const platforms = {};

            // macOS ARM64  (.app.tar.gz + .sig)
            const macArm    = findAsset('aarch64\\.app\\.tar\\.gz$');
            const macArmSig = findAsset('aarch64\\.app\\.tar\\.gz\\.sig$');
            if (macArm && macArmSig) {
              platforms['darwin-aarch64'] = {
                signature: (await fetchAssetText(macArmSig.id)).trim(),
                url: macArm.browser_download_url,
              };
            }

            // macOS Intel  (.app.tar.gz + .sig)
            const macX64    = findAsset('x86_64\\.app\\.tar\\.gz$');
            const macX64Sig = findAsset('x86_64\\.app\\.tar\\.gz\\.sig$');
            if (macX64 && macX64Sig) {
              platforms['darwin-x86_64'] = {
                signature: (await fetchAssetText(macX64Sig.id)).trim(),
                url: macX64.browser_download_url,
              };
            }

            // Windows NSIS  (.nsis.zip + .sig)
            const win    = findAsset('x64-setup\\.nsis\\.zip$');
            const winSig = findAsset('x64-setup\\.nsis\\.zip\\.sig$');
            if (win && winSig) {
              platforms['windows-x86_64'] = {
                signature: (await fetchAssetText(winSig.id)).trim(),
                url: win.browser_download_url,
              };
            }

            // Linux AppImage  (.AppImage.tar.gz + .sig)
            const linux    = findAsset('amd64\\.AppImage\\.tar\\.gz$');
            const linuxSig = findAsset('amd64\\.AppImage\\.tar\\.gz\\.sig$');
            if (linux && linuxSig) {
              platforms['linux-x86_64'] = {
                signature: (await fetchAssetText(linuxSig.id)).trim(),
                url: linux.browser_download_url,
              };
            }

            if (Object.keys(platforms).length === 0) {
              core.setFailed('No signed updater artifacts found — did TAURI_SIGNING_PRIVATE_KEY build correctly?');
              return;
            }

            const manifest = {
              version,
              notes: release.body ?? 'See release notes.',
              pub_date: release.published_at ?? new Date().toISOString(),
              platforms,
            };

            console.log('Generated latest.json:\n', JSON.stringify(manifest, null, 2));

            // Upload latest.json to the draft release
            const content = JSON.stringify(manifest, null, 2);
            const { Buffer } = await import('node:buffer');

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: 'latest.json',
              data: Buffer.from(content),
              headers: { 'content-type': 'application/json' },
            });

            console.log('latest.json uploaded to release', releaseId);
