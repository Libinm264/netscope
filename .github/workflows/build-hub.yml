name: Build & Test Hub

on:
  push:
    branches: [main]
    paths:
      - "hub/**"
      - ".github/workflows/build-hub.yml"
  pull_request:
    branches: [main]
    paths:
      - "hub/**"

jobs:
  # ── Go API ──────────────────────────────────────────────────────────────────
  api:
    name: Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: hub/api/go.mod

      - name: Download dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null .

      - name: Test
        run: go test ./... -timeout 60s

      - name: Docker build (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: hub/api
          push: false
          tags: netscope-hub-api:ci

  # ── Next.js Web ──────────────────────────────────────────────────────────────
  web:
    name: Next.js Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub/web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_API_KEY: ci-test-key
          # Stub out Auth0 vars so the build succeeds in CI
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET || 'ci-stub-secret-32-chars-minimum!!' }}
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://example.auth0.com
          AUTH0_CLIENT_ID: ci-client-id
          AUTH0_CLIENT_SECRET: ci-client-secret

      - name: Docker build (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: hub/web
          push: false
          tags: netscope-hub-web:ci
