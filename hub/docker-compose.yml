version: "3.9"

services:
  # ── Redpanda (Kafka-compatible, no Zookeeper) ───────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"   # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Topic initialisation ────────────────────────────────────────────────────
  redpanda-init:
    image: redpandadata/redpanda:v24.1.1
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rpk topic create netscope.flows --brokers redpanda:9092 --partitions 4 || true
        echo "Topics ready."

  # ── ClickHouse ──────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    environment:
      CLICKHOUSE_DB: netscope
      CLICKHOUSE_USER: netscope
      CLICKHOUSE_PASSWORD: netscope_pass
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Go / Fiber API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    # Not exposed directly — Caddy handles all ingress
    env_file: .env
    environment:
      CLICKHOUSE_DSN: clickhouse://netscope:netscope_pass@clickhouse:9000/netscope
      KAFKA_BROKERS: redpanda:9092
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Web Dashboard ───────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    # Not exposed directly — Caddy handles all ingress
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_API_KEY: ${API_KEY:-changeme}
      # Auth0 (optional — leave blank for local dev without auth)
      AUTH0_SECRET: ${AUTH0_SECRET:-}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-http://localhost}
      AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Caddy (reverse proxy + automatic HTTPS) ─────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_HOSTNAME: ${CADDY_HOSTNAME:-:80}
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  clickhouse_data:
  caddy_data:
  caddy_config:
