# ── Production overrides for docker-compose.yml ───────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars:
#   CADDY_HOSTNAME   your public domain (e.g. hub.example.com)
#   CADDY_EMAIL      email for Let's Encrypt cert registration
#   API_KEY          strong random secret (min 32 chars)

services:

  caddy:
    environment:
      CADDY_HOSTNAME: ${CADDY_HOSTNAME}
      CADDY_EMAIL: ${CADDY_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: always

  api:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  web:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  clickhouse:
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G

  redpanda:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  caddy_data:
  caddy_config:
