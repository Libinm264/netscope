apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netscope.name" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netscope.labels" . | nindent 4 }}
    {{- include "netscope.web.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "netscope.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netscope.web.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hub-web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.targetPort }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "netscope.name" . }}-hub"
            - name: NEXT_PUBLIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netscope.name" . }}-secret
                  key: API_KEY
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netscope.name" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netscope.labels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "netscope.web.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: {{ .Values.web.service.targetPort }}
