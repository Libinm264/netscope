{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "netscope.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netscope.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    {{- if .Values.ingress.tls.certManagerIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManagerIssuer | quote }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "netscope.name" . }}-hub
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "netscope.name" . }}-hub
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "netscope.name" . }}-hub
                port:
                  name: http
          - path: /install
            pathType: Exact
            backend:
              service:
                name: {{ include "netscope.name" . }}-hub
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "netscope.name" . }}-web
                port:
                  name: http
{{- end }}
