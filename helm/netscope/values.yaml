# Default values for the NetScope Helm chart.
# Override with: helm install netscope ./helm/netscope -f my-values.yaml

global:
  # Image pull secrets (e.g. for ghcr.io private repos)
  imagePullSecrets: []
  # Override the chart name used in resource labels
  nameOverride: ""

# ── Hub API (Go backend) ───────────────────────────────────────────────────────
hub:
  replicaCount: 2

  image:
    repository: ghcr.io/netscope/hub-api
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  config:
    port: "8080"
    kafkaBrokers: "redpanda:9092"
    kafkaTopic: "netscope-flows"
    allowedOrigins: "*"

  # Set these via --set hub.secret.* or an external Secrets Manager
  secret:
    clickhouseDSN: "clickhouse://default:@clickhouse:9000/netscope"
    apiKey: "changeme"

# ── Hub Web (Next.js dashboard) ────────────────────────────────────────────────
web:
  replicaCount: 2

  image:
    repository: ghcr.io/netscope/hub-web
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ── Agent DaemonSet ────────────────────────────────────────────────────────────
agent:
  enabled: true

  image:
    repository: ghcr.io/netscope/agent
    tag: latest
    pullPolicy: Always

  # Extra tolerations added to node selector (DaemonSet already has operator: Exists)
  tolerations: []

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Ingress ────────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  ingressClassName: nginx
  host: netscope.example.com
  tls:
    enabled: false
    secretName: netscope-tls
    certManagerIssuer: ""   # e.g. "letsencrypt-prod"
  annotations: {}

# ── ClickHouse (optional bundled deployment) ───────────────────────────────────
clickhouse:
  # Set to false if you're using an external ClickHouse instance
  enabled: false
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.3"
  storage:
    size: 50Gi
    storageClass: ""

# ── Redpanda / Kafka (optional bundled deployment) ────────────────────────────
redpanda:
  enabled: false
  image:
    repository: redpandadata/redpanda
    tag: latest
  storage:
    size: 10Gi
    storageClass: ""
