apiVersion: apps/v1
kind: Deployment
metadata:
  name: netscope-hub
  namespace: netscope
  labels:
    app: netscope-hub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netscope-hub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: netscope-hub
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: hub-api
          image: ghcr.io/netscope/hub-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: netscope-hub-config
            - secretRef:
                name: netscope-hub-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: netscope-hub
  namespace: netscope
  labels:
    app: netscope-hub
spec:
  type: ClusterIP
  selector:
    app: netscope-hub
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
